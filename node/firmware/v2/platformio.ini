[env:esp32wroom]
platform = espressif32
board = esp32dev
framework = arduino

build_flags =
  -I shared
  -D CORE_DEBUG_LEVEL=5
  -D RTC_SDA_PIN=18
  -D RTC_SCL_PIN=19
  -D RTC_INT_PIN=4
  -D MUX_ADDR=0x71
  -D ENABLE_POWER_HOLD_CONTROL=1
  -D PWR_HOLD_PIN=23
  -D PWR_HOLD_ACTIVE_HIGH=1
  -D POST_WAKE_WINDOW_MS=1500
  -D BAT_ADC_PIN=35
  -D BAT_ADC_SAMPLES=16
  -D BAT_DIVIDER_SCALE=3.58f

monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
upload_speed = 460800
monitor_dtr = 0
monitor_rts = 0

lib_deps =
  adafruit/RTClib@^1.14.1
  adafruit/Adafruit SHT4x Library@^1.0.5
  adafruit/Adafruit AS7341@^1.4.1
  WiFi
  Wire

[env:esp32wroom-callback-safety]
platform = espressif32
board = esp32dev
framework = arduino

build_flags =
  -I shared
  -D CORE_DEBUG_LEVEL=5
  -D RTC_SDA_PIN=18
  -D RTC_SCL_PIN=19
  -D RTC_INT_PIN=4
  -D MUX_ADDR=0x71
  -D ENABLE_POWER_HOLD_CONTROL=1
  -D PWR_HOLD_PIN=23
  -D PWR_HOLD_ACTIVE_HIGH=1
  -D POST_WAKE_WINDOW_MS=1500
  -D BAT_ADC_PIN=35
  -D BAT_ADC_SAMPLES=16
  -D BAT_DIVIDER_SCALE=3.58f
  -I $PROJECT_DIR/src

build_src_filter =
  -<*>
  +<../tests/bringup_callback_safety.cpp>
  +<message_dispatch.cpp>
  +<node_event_queue.cpp>

lib_deps =
  adafruit/RTClib@^1.14.1
  WiFi
  Wire

monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
upload_speed = 460800
monitor_dtr = 0
monitor_rts = 0

