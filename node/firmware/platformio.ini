; Interactive reed anemometer bring-up (WH-SP-WS01 on GPIO4). Serial menu:
; 'c' continuous, 's' 5s sample, 'd' GPIO diagnostic. Flash back esp32wroom after.
[env:esp32wroom-reed-wind-test]
extends = env:esp32wroom
build_flags =
  ${env:esp32wroom.build_flags}
  -I $PROJECT_DIR/src
build_src_filter =
  -<*>
  +<../tests/bringup_reed_wind.cpp>

; AS7341 spectral-metadata isolation test. Reuses the PRODUCTION backend
; (sensors_par_as7343.cpp) to prove Clear/NIR/gain/integration/saturation read
; as finite numbers — the fields arriving null in the backend. Prints a per-
; cycle PASS/FAIL verdict every 3 s. Flash back esp32wroom after.
; No fixed upload_port/monitor_port here on purpose — the bench board's COM
; port changes session to session. Always pass --upload-port / --port
; explicitly, and double-check it isn't a deployed node or the mothership.
[env:esp32wroom-spectral-metadata-test]
extends = env:esp32wroom
build_flags =
  ${env:esp32wroom.build_flags}
  -I $PROJECT_DIR/src
build_src_filter =
  -<*>
  +<../tests/bringup_spectral_metadata.cpp>
  +<sensors/sensors_par_as7343.cpp>
