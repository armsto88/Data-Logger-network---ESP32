[env:esp32wroom]
platform = espressif32
board = esp32dev
framework = arduino

; Pin the OTA partition table explicitly. This is byte-identical to the
; Arduino-ESP32 `default.csv` that `board = esp32dev` resolves to today, so
; pinning it changes nothing about the current fleet layout — it guards
; against a future toolchain bump silently altering the default (two 0x140000
; OTA app slots), which is required groundwork for node OTA. See
; partitions_ota.csv header for the rationale.
board_build.partitions = partitions_ota.csv

extra_scripts = pre:../../scripts/fw_version.py
build_flags =
  -I shared
  -D FW_ROLE=\"node\"
  -D FW_HW_TARGET=\"node-v3\"
  -D FW_SEMVER=\"0.1.0\"
  -D CORE_DEBUG_LEVEL=5
  -D RTC_SDA_PIN=18
  -D RTC_SCL_PIN=19
  -D RTC_INT_PIN=4
  -D MUX_ADDR=0x71
  -D ENABLE_POWER_HOLD_CONTROL=1
  -D PWR_HOLD_PIN=23
  -D PWR_HOLD_ACTIVE_HIGH=1
  -D POST_WAKE_WINDOW_MS=1500
  -D BAT_ADC_PIN=35
  -D BAT_ADC_SAMPLES=16
  -D BAT_DIVIDER_SCALE=3.58f

monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
upload_speed = 460800
monitor_dtr = 0
monitor_rts = 0

lib_deps =
  adafruit/RTClib@^1.14.1
  adafruit/Adafruit SHT4x Library@^1.0.5
  adafruit/Adafruit AS7341@^1.4.1
  WiFi
  Wire

; OTA app-slot + rollback proof (Phase 0 gate). Self-contained: no SD, no
; network, no external binary. Uses the pinned node OTA partition table so the
; slots match what nodes will ship with. Menu @115200: i c v r b (see .cpp).
[env:esp32wroom-ota-slots]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = partitions_ota.csv
extra_scripts = pre:../../scripts/fw_version.py
build_flags =
  -I shared
  -I $PROJECT_DIR/src
  -D CORE_DEBUG_LEVEL=3
  -D FW_ROLE=\"node\"
  -D FW_HW_TARGET=\"node-v3\"
  -D FW_SEMVER=\"0.1.0\"
build_src_filter =
  -<*>
  +<../tests/bringup_ota_slots.cpp>
lib_deps =
  Wire
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
upload_speed = 460800
monitor_dtr = 0
monitor_rts = 0

; Ed25519 manifest signature verify + compatibility policy proof.
; Pulls the device crypto (rweather/Crypto -> Ed25519) and JSON parser.
[env:esp32wroom-manifest-verify]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
  -I shared
  -D CORE_DEBUG_LEVEL=3
build_src_filter =
  -<*>
  +<../tests/bringup_manifest_verify.cpp>
lib_deps =
  rweather/Crypto@^0.4.0
  bblanchon/ArduinoJson@^7
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
upload_speed = 460800
monitor_dtr = 0
monitor_rts = 0

