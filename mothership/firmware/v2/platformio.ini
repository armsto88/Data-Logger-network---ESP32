; Mothership V1 bringup tests and main firmware
; Each environment compiles a single self-contained test sketch or the full V1 firmware.

[platformio]
src_dir = .
default_envs = mothership-v1-main

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_port = COM5
monitor_port = COM5
upload_speed = 460800

; Shared protocol headers from node firmware + V1 src includes
build_flags =
  -I $PROJECT_DIR/../../../node/firmware/v2/shared
  -I $PROJECT_DIR/src

; ---------------------------------------------------------------------------
; Bringup test environments
; ---------------------------------------------------------------------------

[env:mothership-v1-pwrhold]
build_src_filter = -<*> +<tests/bringup_pwr_hold.cpp>

[env:mothership-v1-config-latch]
build_src_filter = -<*> +<tests/bringup_config_latch.cpp>

[env:mothership-v1-nvs-anchor]
build_src_filter = -<*> +<tests/bringup_nvs_anchor.cpp>

[env:mothership-v1-rtc-alarm]
build_src_filter = -<*> +<tests/bringup_rtc_alarm.cpp>
lib_deps =
  adafruit/RTClib@^1.14.1

[env:mothership-v1-alarm-verify]
build_src_filter = -<*> +<tests/bringup_alarm_verify.cpp>
lib_deps =
  adafruit/RTClib@^1.14.1

[env:mothership-v1-rescue-alarm]
build_src_filter = -<*> +<tests/bringup_rescue_alarm.cpp>
lib_deps =
  adafruit/RTClib@^1.14.1

[env:mothership-v1-rtc-validity]
build_src_filter = -<*> +<tests/bringup_rtc_validity.cpp>
lib_deps =
  adafruit/RTClib@^1.14.1

[env:mothership-v1-sd-card]
build_src_filter = -<*> +<tests/bringup_sd_card.cpp>

[env:mothership-v1-battery-adc]
build_src_filter = -<*> +<tests/bringup_battery_adc.cpp>

[env:mothership-v1-espnow-basic]
build_src_filter = -<*> +<tests/bringup_espnow_basic.cpp>

[env:mothership-v1-espnow-queue]
build_src_filter = -<*> +<tests/bringup_espnow_queue.cpp>
  +<src/storage/flash_logger.cpp>

[env:mothership-v1-wake-reason]
build_src_filter = -<*> +<tests/bringup_wake_reason.cpp>
lib_deps =
  adafruit/RTClib@^1.14.1

[env:mothership-v1-modem-power]
build_src_filter = -<*> +<tests/bringup_modem_power.cpp>

[env:mothership-v1-modem-uart]
build_src_filter = -<*> +<tests/bringup_modem_uart.cpp>

[env:mothership-v1-modem-identify]
build_src_filter = -<*> +<tests/bringup_modem_identify.cpp>

[env:mothership-v1-modem-sim]
build_src_filter = -<*> +<tests/bringup_modem_sim.cpp>

[env:mothership-v1-modem-sim-diag]
build_src_filter = -<*> +<tests/bringup_modem_sim_diag.cpp>

[env:mothership-v1-modem-network]
build_src_filter = -<*> +<tests/bringup_modem_network.cpp>

[env:mothership-v1-modem-https]
build_src_filter = -<*> +<tests/bringup_modem_https.cpp>

[env:mothership-v1-modem-powercycle]
build_src_filter = -<*> +<tests/bringup_modem_powercycle.cpp>

[env:mothership-v1-upload-cursor]
build_src_filter = -<*> +<tests/bringup_upload_cursor.cpp>

[env:mothership-v1-flash-purge]
build_src_filter = -<*> +<tests/bringup_flash_purge.cpp>
  +<src/storage/flash_logger.cpp>
  +<src/storage/upload_queue.cpp>

[env:mothership-v1-flash-write-check]
build_src_filter = -<*> +<tests/bringup_flash_write_check.cpp>
  +<src/storage/flash_logger.cpp>

[env:mothership-v1-atomic-purge]
build_src_filter = -<*> +<tests/bringup_atomic_purge.cpp>
  +<src/storage/flash_logger.cpp>
  +<src/storage/upload_queue.cpp>

[env:mothership-v1-upload-chunk]
build_src_filter = -<*> +<tests/bringup_upload_chunk.cpp>
  +<src/storage/flash_logger.cpp>
  +<src/storage/upload_queue.cpp>

[env:mothership-v1-config-wake-test]
build_src_filter = -<*> +<tests/bringup_config_wake_test.cpp>
lib_deps =
  adafruit/RTClib@^1.14.1

; ---------------------------------------------------------------------------
; V2 snapshot migration test scaffolds (SKIP at runtime until impl is done)
; ---------------------------------------------------------------------------

[env:mothership-v1-test-espnow-dispatch]
build_src_filter = -<*> +<tests/test_espnow_dispatch.cpp>

[env:mothership-v1-test-csv-format]
build_src_filter = -<*> +<tests/test_csv_format.cpp>

[env:mothership-v1-test-upload-queue]
build_src_filter = -<*> +<tests/test_upload_queue.cpp>

; ---------------------------------------------------------------------------
; Main V1 firmware
; ---------------------------------------------------------------------------

; ---------------------------------------------------------------------------
; V2 snapshot migration test scaffolds
; ---------------------------------------------------------------------------

[env:mothership-v2-test-espnow-dispatch]
build_src_filter = -<*> +<tests/test_espnow_dispatch.cpp>

[env:mothership-v2-test-csv-format]
build_src_filter = -<*> +<tests/test_csv_format.cpp>

[env:mothership-v2-test-upload-queue]
build_src_filter = -<*> +<tests/test_upload_queue.cpp>

[env:mothership-v2-test-spectral-pipeline]
extends = env:mothership-v1-main
build_src_filter = -<*>
  +<tests/test_spectral_pipeline.cpp>
  +<src/storage/flash_logger.cpp>
  +<src/storage/json_payload.cpp>

[env:mothership-v1-sim-test]
build_src_filter = -<*> +<tests/test_sim_thinkmobile.cpp> +<src/comms/modem_driver.cpp>

; ---------------------------------------------------------------------------
; Main V1 firmware
; ---------------------------------------------------------------------------

[env:mothership-v1-main]
build_src_filter = -<*> +<src/**>
  -<src/storage/sd_manager.cpp>
  -<src/comms/espnow_manager.cpp>
  -<src/comms/espnow_manager_globals.cpp>
  -<src/ble/ble_manager.cpp>
  -<src/time/rtc_manager.cpp>
  +<src/config/**>
  +<src/comms/espnow_config.cpp>
board_build.partitions = partitions.csv
lib_deps =
  adafruit/RTClib@^1.14.1
  esp32-arduino
  ; LittleFS is bundled with the Arduino-ESP32 core; listed for clarity.
  ; No external dependency needed — #include <LittleFS.h> resolves via core.
build_flags =
  ${env.build_flags}
  -D ENABLE_WIFI_AP_WEBSERVER=1
  -D ENABLE_CAPTIVE_PORTAL=1
  -D ENABLE_ESPNOW_RUNTIME=1
  -D ENABLE_BLE_GATT=0
