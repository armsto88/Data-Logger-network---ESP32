[platformio]
test_dir = tests

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = 
  jchristensen/DS3232RTC@^2.0.0
  adafruit/RTClib@^1.14.1
build_flags =
  -I nodes/shared

[env:esp32wroom-smoke]
platform = espressif32
board = esp32dev
framework = arduino
test_framework = unity
build_flags =
  -I nodes/shared
test_filter = test_smoke_esp32_wroom
monitor_speed = 115200

[env:esp32wroom-serial-counter]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_serial_counter.cpp>

[env:esp32wroom-i2c-scan]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
build_flags =
  -D I2C_SDA_PIN=18
  -D I2C_SCL_PIN=19
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_i2c_scan.cpp>

[env:esp32wroom-txpwm-gate]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
build_flags =
  -D TX_PWM_PIN=25
  -D TX_PWM_ACTIVE_HIGH=1
  -D TX_PWM_ON_MS=15000
  -D TX_PWM_OFF_MS=15000
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_tx_pwm_gate.cpp>