[platformio]
src_dir = firmware

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 460800
monitor_speed = 115200
lib_deps = 
  jchristensen/DS3232RTC@^2.0.0
  adafruit/RTClib@^1.14.1
build_flags =
  -I firmware/nodes/shared
  -D CORE_DEBUG_LEVEL=0
build_src_filter = +<mothership/src/**>

[env:esp32wroom-serial-counter]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<nodes/bringup/bringup_serial_counter.cpp>

[env:esp32wroom-i2c-scan]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
build_flags =
  -D I2C_SDA_PIN=18
  -D I2C_SCL_PIN=19
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<nodes/bringup/bringup_i2c_scan.cpp>

