[env:esp32wroom-ultrasonic-first-test]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 38400
upload_flags =
  --no-stub
build_flags =
  -D PIN_TOF_EDGE=34
  -D PIN_RX_EN=4
  -D PIN_MUX_A=16
  -D PIN_MUX_B=17
  -D PIN_DRV_N=26
  -D PIN_DRV_E=27
  -D PIN_DRV_S=14
  -D PIN_DRV_W=13
  -D PIN_REL_N=33
  -D PIN_REL_E=32
  -D PIN_REL_S=21
  -D PIN_REL_W=22
  -D PIN_TX_PWM=25
  -D RX_EN_ACTIVE_HIGH=1
  -D TX_PWM_ACTIVE_HIGH=1
  -D BLANKING_US=320
  -D TOF_TIMEOUT_US=3000
  -D MIN_VALID_TOF_US=220
  -D BURST_CYCLES=12
  -D INTER_SHOT_MS=120
  -D WARMUP_SHOTS=10
  -D SCORE_SHOTS=24
  -D VERBOSE_SHOTS=0
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<nodes/bringup/bringup_ultrasonic_first_test.cpp>

