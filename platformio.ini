  -D I2C_SDA_PIN=18
  -D I2C_SCL_PIN=19
  -D MUX_ADDR=0x71
  -D SHTC3_ADDR=0x70
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<nodes/bringup/bringup_i2c_mux_shtc3.cpp>

