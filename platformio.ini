[platformio]
test_dir = tests

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = 
  jchristensen/DS3232RTC@^2.0.0
  adafruit/RTClib@^1.14.1
build_flags =
  -I nodes/shared

[env:esp32wroom-smoke]
platform = espressif32
board = esp32dev
framework = arduino
test_framework = unity
build_flags =
  -I nodes/shared
test_filter = test_smoke_esp32_wroom
monitor_speed = 115200

[env:esp32wroom-serial-counter]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_serial_counter.cpp>

[env:esp32wroom-i2c-scan]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
build_flags =
  -D I2C_SDA_PIN=18
  -D I2C_SCL_PIN=19
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_i2c_scan.cpp>

[env:esp32wroom-txpwm-gate]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
build_flags =
  -D TX_PWM_PIN=25
  -D TX_PWM_ACTIVE_HIGH=1
  -D TX_PWM_ON_MS=15000
  -D TX_PWM_OFF_MS=15000
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_tx_pwm_gate.cpp>

[env:esp32wroom-pwrhold-gate]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
build_flags =
  -D PWR_HOLD_PIN=23
  -D PWR_HOLD_ACTIVE_HIGH=1
  -D PWR_HOLD_ON_MS=15000
  -D PWR_HOLD_OFF_MS=15000
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_pwr_hold_gate.cpp>

[env:esp32wroom-i2c-mux-shtc3]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
lib_deps =
  https://github.com/sparkfun/SparkFun_SHTC3_Arduino_Library.git
build_flags =
  -D I2C_SDA_PIN=18
  -D I2C_SCL_PIN=19
  -D MUX_ADDR=0x71
  -D SHTC3_ADDR=0x70
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_i2c_mux_shtc3.cpp>

[env:esp32wroom-i2c-mux-power-probe]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
build_flags =
  -D I2C_SDA_PIN=18
  -D I2C_SCL_PIN=19
  -D MUX_ADDR=0x71
  -D MUX_CHANNEL_DWELL_MS=15000
  -D MUX_ALL_OFF_DWELL_MS=5000
  -D MUX_FIXED_CHANNEL=-1
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_i2c_mux_power_probe.cpp>

[env:esp32wroom-ads1015-analog]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 57600
upload_flags =
  --no-stub
lib_deps =
  adafruit/Adafruit ADS1X15@^2.5.0
build_flags =
  -D I2C_SDA_PIN=18
  -D I2C_SCL_PIN=19
  -D ADS1015_ADDR=0x48
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_ads1015_analog.cpp>

[env:esp32wroom-ultrasonic-first-test]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 38400
upload_flags =
  --no-stub
build_flags =
  -D PIN_TOF_EDGE=34
  -D PIN_RX_EN=4
  -D PIN_MUX_A=16
  -D PIN_MUX_B=17
  -D PIN_DRV_N=26
  -D PIN_DRV_E=27
  -D PIN_DRV_S=14
  -D PIN_DRV_W=13
  -D PIN_REL_N=33
  -D PIN_REL_E=32
  -D PIN_REL_S=21
  -D PIN_REL_W=22
  -D PIN_TX_PWM=25
  -D RX_EN_ACTIVE_HIGH=1
  -D TX_PWM_ACTIVE_HIGH=1
  -D BLANKING_US=320
  -D TOF_TIMEOUT_US=3000
  -D MIN_VALID_TOF_US=220
  -D BURST_CYCLES=12
  -D INTER_SHOT_MS=120
  -D WARMUP_SHOTS=10
  -D SCORE_SHOTS=24
  -D VERBOSE_SHOTS=0
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_ultrasonic_first_test.cpp>

[env:esp32wroom-ds3231-alarm-10s]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
upload_speed = 38400
upload_flags =
  --no-stub
lib_deps =
  adafruit/RTClib@^1.14.1
build_flags =
  -D I2C_SDA_PIN=18
  -D I2C_SCL_PIN=19
  -D RTC_ADDR=0x68
  -D ALARM_INTERVAL_S=10
  -D ALARM_HOLD_MS=8000
  -D FORCE_SET_RTC_ON_BOOT=1
monitor_port = COM3
monitor_speed = 115200
build_src_filter = +<bringup_ds3231_alarm_10s.cpp>